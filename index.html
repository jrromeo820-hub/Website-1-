<!DOCTYPE html>
<html>
<head>

<title>LuxeThreads Premium</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* NAVBAR */

nav{
background:black;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav h1{
color:gold;
margin:0;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}

/* HERO */

.hero{
height:300px;
background:url("https://picsum.photos/900/600");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.hero h2{
background:black;
padding:10px;
color:gold;
}

/* PRODUCTS */

.products{
padding:20px;
text-align:center;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.card img{
width:100%;
transition:0.4s;
}

.card:hover img{
transform:scale(1.1);
}

.card:hover{
transform:translateY(-5px);
}

/* CONTACT */

.contact{
padding:20px;
text-align:center;
background:#111;
}

/* FOOTER */

footer{
background:black;
text-align:center;
padding:10px;
color:gray;
}

</style>

</head>

<nav>
