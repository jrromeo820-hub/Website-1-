<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuxeThreads</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:white;
color:black;
scroll-behavior:smooth;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
border-bottom:1px solid #eee;
position:sticky;
top:0;
background:white;
z-index:1000;
}

nav h1{
letter-spacing:3px;
font-weight:700;
}

nav a{
margin:10px;
text-decoration:none;
color:black;
font-size:14px;
}

/* HERO */

.hero{
height:95vh;
background:url("https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=1600&auto=format&fit=crop") center/cover;
display:flex;
align-items:center;
justify-content:center;
animation:fade 1.5s;
}

.hero h2{
background:white;
padding:15px 30px;
font-size:32px;
letter-spacing:4px;
}

@keyframes fade{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

/* TITLE */

.title{
text-align:center;
font-size:22px;
letter-spacing:3px;
margin:40px 0;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:10px;
}

.card{
overflow:hidden;
transition:0.3s;
}

.card img{
width:100%;
transition:0.5s;
}

.card:hover img{
transform:scale(1.1);
}

.card:hover{
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* ABOUT */

.about{
padding:40px;
text-align:center;
}

/* CONTACT */

.contact{
padding:40px;
text-align:center;
background:#f5f5f5;
}

/* FOOTER */

footer{
padding:20px;
text-align:center;
border-top:1px solid #ddd;
margin-top:30px;
}

</style>

</head>

<body>

<nav>

<h1>LUXETHREADS</h1>

<div>
<a href="#">NEW</a>
<a href="#">MEN</a>
<a href="#">WOMEN</a>
<a href="#">CONTACT</a>
</div>

</nav>


<div class="hero">

<h2>NEW COLLECTION</h2>

</div>


<div class="title">

LATEST COLLECTION

</div>


<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?q=80&w=800&auto=format&fit=crop">
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=800&auto=format&fit=crop">
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=800&auto=format&fit=crop">
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=800&auto=format&fit=crop">
</div>

</div>


<div class="about">

<h2>About LuxeThreads</h2>

<p>Premium streetwear and custom embroidery clothing brand.</p>

</div>


<div class="contact">

<h2>Contact</h2>

<p>Instagram: @luxethreads</p>

</div>


<footer>

LuxeThreads © 2026

</footer>


</body>
</html>
